<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coino | Budget Planner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header glass">
      <a class="logo" href="index.html"><img src="logo.svg" alt="Coino logo" /><span>Coino</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="savings-goals.html">Savings Goals</a>
        <a href="spending-insights.html">Spending Insights</a>
      </nav>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme"><span class="sun">☀️</span><span class="moon">🌙</span></button>
    </header>

    <main class="container">
      <section class="glass reveal page-title">
        <h1>Interactive Budget Planner</h1>
        <p>Adjust your weekly amounts and see your remaining balance in real-time.</p>
      </section>

      <section class="glass planner reveal delay-1">
        <div class="sliders">
          <label>Weekly Income (£<span id="incomeVal">35</span>)
            <input type="range" min="10" max="100" value="35" id="income" />
          </label>
          <label>Needs (£<span id="needsVal">12</span>)
            <input type="range" min="0" max="60" value="12" id="needs" />
          </label>
          <label>Wants (£<span id="wantsVal">10</span>)
            <input type="range" min="0" max="60" value="10" id="wants" />
          </label>
          <label>Savings (£<span id="saveVal">8</span>)
            <input type="range" min="0" max="60" value="8" id="save" />
          </label>
        </div>

        <div class="summary-card">
          <div class="donut" id="budgetDonut"></div>
          <p>Total Planned: <strong id="planned">£30</strong></p>
          <p>Left Over: <strong id="leftover">£5</strong></p>
          <p id="budgetTip" class="tip">Great! You still have money left.</p>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
