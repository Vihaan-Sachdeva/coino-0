<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coino | Spending Insights</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header glass">
      <a class="logo" href="index.html"><img src="logo.svg" alt="Coino logo" /><span>Coino</span></a>
      <nav class="nav-links"><a href="index.html">Home</a><a href="budget-planner.html">Budget Planner</a><a href="savings-goals.html">Savings Goals</a></nav>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme"><span class="sun">☀️</span><span class="moon">🌙</span></button>
    </header>

    <main class="container">
      <section class="glass reveal page-title"><h1>Spending Insights</h1><p>Add and edit custom daily filters for each day of the week.</p></section>

      <section class="glass insights reveal delay-1">
        <form id="insightFilterForm" class="inline-form">
          <input id="insightFilterName" maxlength="14" placeholder="Filter name" />
          <button class="btn btn-primary" type="submit">Add Filter</button>
        </form>
        <div class="editable-list" id="insightFilterList"></div>
        <div class="insight-bars" id="insightBars"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
