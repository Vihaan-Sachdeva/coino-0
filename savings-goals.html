<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coino | Savings Goals</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <header class="site-header glass">
      <a class="logo" href="index.html"><img src="logo.svg" alt="Coino logo" /><span>Coino</span></a>
      <nav class="nav-links"><a href="index.html">Home</a><a href="budget-planner.html">Budget Planner</a><a href="spending-insights.html">Spending Insights</a></nav>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme"><span class="sun">☀️</span><span class="moon">🌙</span></button>
    </header>

    <main class="container">
      <section class="glass reveal page-title"><h1>Savings Goal Tracker</h1><p>Add and manage custom goals with your own target values.</p></section>

      <section class="glass reveal delay-1">
        <form id="goalForm" class="inline-form" style="padding:1rem;">
          <input id="goalName" maxlength="20" placeholder="Goal name" />
          <input id="goalTarget" type="number" min="5" placeholder="Target (£)" />
          <input id="goalCurrent" type="number" min="0" placeholder="Saved (£)" />
          <button class="btn btn-primary" type="submit">Add Goal</button>
        </form>
      </section>

      <section class="goals-grid" id="goalList"></section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
