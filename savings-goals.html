<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coino | Savings Goals</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <header class="site-header glass">
      <a class="logo" href="index.html"><img src="logo.svg" alt="Coino logo" /><span>Coino</span></a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="budget-planner.html">Budget Planner</a>
        <a href="spending-insights.html">Spending Insights</a>
      </nav>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme"><span class="sun">☀️</span><span class="moon">🌙</span></button>
    </header>

    <main class="container">
      <section class="glass reveal page-title">
        <h1>Savings Goal Tracker</h1>
        <p>Pick a target, add savings, and watch your progress animate instantly.</p>
      </section>

      <section class="goals-grid">
        <article class="glass goal-card reveal">
          <h3>🎧 Headphones</h3>
          <div class="ring" data-target="120" data-current="45">
            <span>£45 / £120</span>
          </div>
          <button class="btn btn-primary add-save">+£5 saved</button>
        </article>

        <article class="glass goal-card reveal delay-1">
          <h3>🚲 Bike Upgrade</h3>
          <div class="ring" data-target="200" data-current="80">
            <span>£80 / £200</span>
          </div>
          <button class="btn btn-primary add-save">+£5 saved</button>
        </article>

        <article class="glass goal-card reveal delay-2">
          <h3>🎮 New Game</h3>
          <div class="ring" data-target="60" data-current="20">
            <span>£20 / £60</span>
          </div>
          <button class="btn btn-primary add-save">+£5 saved</button>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
